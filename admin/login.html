<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VRDMMT | SECURE ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(122, 12, 1, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(122, 12, 1, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(122, 12, 1, 0.05) 0%, transparent 40%);
            animation: pulse 8s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .login-container {
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid rgba(122, 12, 1, 0.3);
            border-radius: 24px;
            padding: 50px 40px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.8),
                0 0 0 1px rgba(122, 12, 1, 0.1);
            position: relative;
            z-index: 2;
        }

        .logo {
            font-family: 'Bebas Neue';
            font-size: 3.5rem;
            letter-spacing: 6px;
            color: #7A0C01;
            margin-bottom: 8px;
            text-shadow: 0 0 40px rgba(122, 12, 1, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .logo i {
            font-size: 2.5rem;
        }

        .subtitle {
            font-size: 0.85rem;
            opacity: 0.4;
            margin-bottom: 40px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 24px;
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #555;
            font-size: 1.1rem;
            pointer-events: none;
        }

        input[type="password"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 18px 20px 18px 50px;
            border-radius: 14px;
            font-size: 1.1rem;
            transition: all 0.3s;
            text-align: center;
            letter-spacing: 3px;
            font-family: 'Inter', monospace;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #7A0C01;
            background: rgba(122, 12, 1, 0.08);
            box-shadow: 0 0 30px rgba(122, 12, 1, 0.2);
        }

        input[type="password"]::placeholder {
            color: #444;
            letter-spacing: 2px;
        }

        button[type="submit"] {
            width: 100%;
            background: #7A0C01;
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-family: 'Bebas Neue';
            font-size: 1.4rem;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        button[type="submit"]::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        button[type="submit"]:hover {
            background: #9a1c11;
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(122, 12, 1, 0.4);
        }

        button[type="submit"]:hover::before {
            left: 100%;
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        .error {
            color: #ff4444;
            font-size: 0.9rem;
            margin-top: 20px;
            opacity: 0;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: rgba(255, 68, 68, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(255, 68, 68, 0.2);
        }

        .error.show {
            opacity: 1;
        }

        .hint {
            margin-top: 30px;
            font-size: 0.75rem;
            opacity: 0.25;
            line-height: 1.6;
        }

        /* Glitch animation */
        @keyframes glitch {
            0%, 100% { transform: translate(0); filter: hue-rotate(0); }
            10% { transform: translate(-2px, 2px); }
            20% { transform: translate(2px, -2px); }
            30% { transform: translate(-2px, -2px); }
            40% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, 0); filter: hue-rotate(90deg); }
            60% { transform: translate(2px, 0); }
            70% { transform: translate(0, 2px); }
            80% { transform: translate(0, -2px); }
            90% { transform: translate(2px, 2px); }
        }

        .glitch {
            animation: glitch 0.4s cubic-bezier(.25, .46, .45, .94) both;
            color: #ff4444 !important;
            text-shadow: 2px 0 #ff0000, -2px 0 #00ff00;
        }

        /* Success animation */
        @keyframes success {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .success {
            animation: success 0.3s ease;
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(122, 12, 1, 0.5);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 40px 25px;
            }
            .logo {
                font-size: 2.5rem;
            }
            .logo i {
                font-size: 1.8rem;
            }
            input[type="password"] {
                padding: 15px 15px 15px 45px;
                font-size: 1rem;
            }
            button[type="submit"] {
                padding: 15px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="login-container">
        <div class="logo">
            <i class="fas fa-shield-alt"></i>
            VRDMMT
        </div>
        <div class="subtitle">Control Center Access</div>
        
        <form id="loginForm">
            <div class="input-group">
                <i class="fas fa-lock input-icon"></i>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="••••••••" 
                    autocomplete="off" 
                    autofocus
                    required
                >
            </div>
            <button type="submit">
                <i class="fas fa-unlock"></i> AUTHENTICATE
            </button>
        </form>
        
        <div class="error" id="errorMsg">
            <i class="fas fa-exclamation-triangle"></i>
            <span>ACCESS DENIED</span>
        </div>
        
        <div class="hint">
            Default: vrdmmt2024<br>
            Ändere das Passwort in common.js (Funktion login())
        </div>
    </div>

    <script src="../scripts/common.js"></script>
    <script>
        // --- Partikel einmalig erzeugen ---
        (function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            // Nur erstellen, wenn noch keine Partikel vorhanden
            if (container.children.length === 0) {
                for (let i = 0; i < 30; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.left = Math.random() * 100 + '%';
                    p.style.animationDelay = Math.random() * 15 + 's';
                    p.style.animationDuration = (10 + Math.random() * 10) + 's';
                    container.appendChild(p);
                }
            }
        })();

        // --- Prüfen, ob common.js geladen wurde und die Login-Funktion existiert ---
        if (typeof login !== 'function' || typeof AUTH_KEY === 'undefined') {
            console.error('common.js nicht korrekt geladen. login() oder AUTH_KEY fehlen.');
            document.getElementById('errorMsg').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Systemfehler – Login nicht verfügbar';
            document.getElementById('errorMsg').classList.add('show');
        }

        // --- Weiterleitung bei bereits aktivem Login ---
        if (sessionStorage.getItem(AUTH_KEY)) {
            window.location.href = 'index_admin.html';
        }

        const form = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('errorMsg');
        const logo = document.querySelector('.logo');

        let errorTimeout = null;

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const pwd = passwordInput.value;
            
            if (typeof login === 'function' && login(pwd)) {
                // Erfolgreich
                if (errorTimeout) clearTimeout(errorTimeout);
                logo.classList.add('success');
                errorMsg.classList.remove('show');
                passwordInput.style.borderColor = '#00C853';
                
                setTimeout(() => {
                    window.location.href = 'index_admin.html';
                }, 500);
            } else {
                // Fehler
                if (errorTimeout) clearTimeout(errorTimeout);
                errorMsg.classList.add('show');
                logo.classList.add('glitch');
                passwordInput.value = '';
                passwordInput.style.borderColor = '#ff4444';
                
                // Fehlermeldung nach 2 Sekunden automatisch ausblenden
                errorTimeout = setTimeout(() => {
                    errorMsg.classList.remove('show');
                    passwordInput.style.borderColor = '';
                }, 2000);
                
                setTimeout(() => {
                    logo.classList.remove('glitch');
                }, 400);
            }
        });

        // Enter-Taste im Input
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
